name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.changeset/**'
      - 'packages/**/package.json'

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@vue-interface'
          
      - name: Install dependencies
        run: pnpm install

      - name: Debug npm auth
        run: |
          echo "--- .npmrc ---"
          cat "$NPM_CONFIG_USERCONFIG" 2>/dev/null || echo "No NPM_CONFIG_USERCONFIG"
          cat .npmrc 2>/dev/null || echo "No .npmrc in project"
          echo "--- npm whoami ---"
          npm whoami 2>&1 || true
          echo "--- npm config get registry ---"
          npm config get registry
          echo "--- env ---"
          echo "NODE_AUTH_TOKEN set: $([ -n \"$NODE_AUTH_TOKEN\" ] && echo yes || echo no)"
          echo "NPM_CONFIG_PROVENANCE: $NPM_CONFIG_PROVENANCE"

      - name: Build Packages
        run: pnpm build
      
      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: "chore: version bump from changesets"
          title: "🚀 Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TagField</title>
</head>

<body class="dark:bg-neutral-900 dark:text-white">
    <div id="app" class="container mx-auto">
        <h1 class="text-4xl mb-4">tag-field</h1>

        <h2 class="text-2xl mb-3">Basic Usage</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field v-model="selected" :options="languages"></tag-field>
            <tag-field :options="options" placeholder="Type to search..." label="Placeholder"></tag-field>
            <tag-field :options="options" label="Descriptive Text Field" help-text="Some helpful text goes here."></tag-field>
            <tag-field :options="options" label="Readonly" placeholder="Type something here..." readonly></tag-field>
            <tag-field :options="options" label="Disabled" disabled></tag-field>
            <tag-field :options="options" placeholder="Disabled" label="Disabled (Placeholder)" disabled></tag-field>
            <tag-field :options="options" label="Clearable" placeholder="Clearable" clearable></tag-field>
        </div>

        <h2 class="text-2xl mb-3">Custom Tags</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field allow-custom :options="languages" label="Allow Custom (with options)" placeholder="Type and press enter..."></tag-field>
            <tag-field allow-custom label="Allow Custom (no options)" placeholder="Type anything and press enter..."></tag-field>
        </div>

        <h2 class="text-2xl mb-3">Sizes</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field :options="options" size="form-control-xs" placeholder="form-control-xs"></tag-field>
            <tag-field :options="options" size="form-control-sm" placeholder="form-control-sm"></tag-field>
            <tag-field :options="options" size="form-control-md" placeholder="form-control-md"></tag-field>
            <tag-field :options="options" size="form-control-lg" placeholder="form-control-lg"></tag-field>
            <tag-field :options="options" size="form-control-xl" placeholder="form-control-xl"></tag-field>
            <tag-field :options="options" size="form-control-2xl" placeholder="form-control-2xl"></tag-field>
            <tag-field :options="options" size="form-control-3xl" placeholder="form-control-3xl"></tag-field>
            <tag-field :options="options" size="form-control-4xl" placeholder="form-control-4xl"></tag-field>
            <tag-field :options="options" size="form-control-5xl" placeholder="form-control-5xl"></tag-field>
            <tag-field :options="options" size="form-control-3" placeholder="form-control-3"></tag-field>
            <tag-field :options="options" size="form-control-3.5" placeholder="form-control-3.5"></tag-field>
            <tag-field :options="options" size="form-control-4" placeholder="form-control-4"></tag-field>
            <tag-field :options="options" size="form-control-5" placeholder="form-control-5"></tag-field>
            <tag-field :options="options" size="form-control-[16px]" placeholder="form-control-[16px]"></tag-field>
            <tag-field :options="options" size="form-control-[1.5rem]" placeholder="form-control-[1.5rem]"></tag-field>
            
        </div>
        
        <h2 class="text-2xl mb-3">Validation</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field v-model="selected" :options="options" label="Empty Array of errors" :errors="[]"></tag-field>
            <tag-field :options="options" invalid label="Single Inline Error" error="This is an inline error."></tag-field>
            <tag-field :options="options" invalid label="Array of Errors" :errors="['First Error', 'Second Error']"></tag-field>
            <tag-field :options="options" invalid label="Multiple Errors From Object" :errors="['This is an inline error #1.', 'This is an inline error #2.']"></tag-field>
            <tag-field :options="options" valid label="Valid Field"></tag-field>
            <tag-field :options="options" valid label="Valid Field with Feedback" feedback="This is some success message."></tag-field>
            <tag-field :options="options" valid label="Valid Field with Array of Feedback" :feedback="['This is some success message.', 'This is some success message.']"></tag-field>
        </div>

        <h2 class="text-2xl mb-3">Custom Colors</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field :options="options" class="tag-field-amber-500" placeholder="tag-field-amber-500"></tag-field>
            <tag-field :options="options" class="tag-field-green-500" placeholder="tag-field-green-500"></tag-field>
            <tag-field :options="options" class="tag-field-purple-500" placeholder="tag-field-purple-500"></tag-field>
            <tag-field :options="options" class="tag-field-neutral-500" placeholder="tag-field-neutral-500"></tag-field>
        </div>

        <h2 class="text-2xl mb-3">Icons</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field :options="options" size="form-control-xs" placeholder="xs">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-sm" placeholder="sm">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-md" placeholder="md">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-lg" placeholder="lg">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-xl" placeholder="xl">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-2xl" placeholder="2xl">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-3xl" placeholder="3xl">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-4xl" placeholder="4xl">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-5xl" placeholder="5xl">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>

            <tag-field :options="options" size="form-control-3" placeholder="form-control-3">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-3.5" placeholder="form-control-3.5">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-4" placeholder="form-control-4">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-5" placeholder="form-control-5">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>

            
            <tag-field :options="options" size="form-control-[16px]" placeholder="form-control-[16px]">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
            <tag-field :options="options" size="form-control-[1.5rem]" placeholder="form-control-[1.5rem]">
                <template #icon>
                    <calendar-days-icon></calendar-days-icon>
                </template>
            </tag-field>
        </div>

        <h2 class="text-2xl mb-3">Activity Indicator</h2>

        <div class="flex flex-col gap-4 mb-4">
            <tag-field :options="options" label="Small" size="form-control-sm" :indicator="Dots()" indicator-size="activity-indicator-sm" :activity="showActivity"></tag-field>
            <tag-field :options="options" label="Medium" size="form-control-md" :indicator="Pulse()" indicator-size="activity-indicator-sm" :activity="showActivity"></tag-field>
            <tag-field :options="options" label="Large" size="form-control-lg" :indicator="Spinner()" indicator-size="activity-indicator-sm" :activity="showActivity"></tag-field>

            <button type="button" class="underline text-blue-600" @click="showActivity = !showActivity">
                <span v-if="!showActivity">Show</span><span v-else>Hide</span> Activity
            </button>
        </div>
    </div>

    <script type="module">
        import "./demo.css";
        import { createApp, ref } from 'vue/dist/vue.esm-bundler.js';
        import { Dots, Pulse, Spinner } from '@vue-interface/activity-indicator';
        import { CalendarDaysIcon } from '@heroicons/vue/24/outline';
        import { TagField } from './index';

        const vue = createApp({
            components: {
                TagField,
                CalendarDaysIcon
            },
            setup() {
                const selected = ref();
                const showActivity = ref(false);
                const options = [
                    'Option 1',
                    'Option 2',
                    'Option 3',
                    'Option 4',
                    'Option 5',
                    'Option 6',
                    'Option 7',
                    'Option 8',
                    'Option 9',
                    'Option 10'
                ];
                const languages = [
                    'javaScript',
                    'Python',
                    'Java',
                    'TypeScript',
                    'C#',
                    'C++',
                    'PHP',
                    'Go',
                    'Rust',
                    'Swift'
                ];
                return {
                    selected,
                    showActivity,
                    options,
                    languages,
                    Dots: () => Dots,
                    Pulse: () => Pulse,
                    Spinner: () => Spinner
                };
            }
        });
        vue.mount('#app')
    </script>
</body>

</html>
